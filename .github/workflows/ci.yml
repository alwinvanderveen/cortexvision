name: CI — Build, Test & Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  COVERAGE_THRESHOLD: 60

jobs:
  build-and-test:
    name: Build & Test
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true

      - name: Show toolchain info
        run: |
          swift --version
          xcodebuild -version

      - name: Build
        run: swift build

      - name: Run tests with coverage
        id: tests
        run: |
          set -o pipefail
          swift test --enable-code-coverage 2>&1 | tee /tmp/cortexvision-test-output.txt
        continue-on-error: true

      - name: Parse results for dashboard
        if: always()
        run: |
          mkdir -p TestResults
          echo "Coverage JSON files:"
          ls -la .build/debug/codecov/ 2>/dev/null || echo "No codecov directory found"
          swift Scripts/parse-results.swift \
            /tmp/cortexvision-test-output.txt \
            .build/debug/codecov/CortexVision.json \
            TestResults \
            "${{ github.workspace }}"

      - name: Extract coverage percentage
        id: coverage
        if: always()
        run: |
          if [ -f TestResults/dashboard.json ]; then
            COVERAGE=$(python3 -c "
          import json
          with open('TestResults/dashboard.json') as f:
              data = json.load(f)
          print(f'{data[\"coverage\"][\"percentage\"]:.1f}')
          ")
          else
            COVERAGE="0.0"
          fi
          echo "percentage=$COVERAGE" >> "$GITHUB_OUTPUT"
          echo "Coverage: $COVERAGE%"

      - name: Check test results
        run: |
          if [ "${{ steps.tests.outcome }}" != "success" ]; then
            echo "FAIL: Some tests failed"
            exit 1
          fi

      - name: Check coverage threshold
        if: always()
        run: |
          COVERAGE=${{ steps.coverage.outputs.percentage }}
          echo "Coverage: ${COVERAGE}% (threshold: ${COVERAGE_THRESHOLD}%)"
          python3 -c "
          coverage = float('${COVERAGE}')
          threshold = float('${COVERAGE_THRESHOLD}')
          if coverage < threshold:
              print(f'FAIL: Coverage {coverage}% is below threshold {threshold}%')
              exit(1)
          else:
              print(f'PASS: Coverage {coverage}% meets threshold {threshold}%')
          "

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: test-results
          path: TestResults/
          retention-days: 30
