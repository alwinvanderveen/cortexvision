name: CI — Build, Test & Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  COVERAGE_THRESHOLD: 85

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Resolve packages
        run: xcodebuild -resolvePackageDependencies -scheme CortexVision-Package -destination 'platform=macOS'

      - name: Build
        run: |
          xcodebuild build \
            -scheme CortexVision-Package \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO

      - name: Run tests with coverage
        run: |
          xcodebuild test \
            -scheme CortexVision-Package \
            -destination 'platform=macOS' \
            -enableCodeCoverage YES \
            -resultBundlePath TestResults/results.xcresult \
            CODE_SIGNING_ALLOWED=NO

      - name: Parse results for dashboard
        if: always()
        run: swift Scripts/parse-results.swift TestResults/results.xcresult TestResults .

      - name: Extract coverage percentage
        id: coverage
        if: always()
        run: |
          if [ -f TestResults/dashboard.json ]; then
            COVERAGE=$(python3 -c "
          import json
          with open('TestResults/dashboard.json') as f:
              data = json.load(f)
          print(f'{data[\"coverage\"][\"percentage\"]:.1f}')
          ")
          else
            COVERAGE="0.0"
          fi
          echo "percentage=$COVERAGE" >> "$GITHUB_OUTPUT"
          echo "Coverage: $COVERAGE%"

      - name: Check coverage threshold
        run: |
          COVERAGE=${{ steps.coverage.outputs.percentage }}
          echo "Coverage: ${COVERAGE}% (threshold: ${COVERAGE_THRESHOLD}%)"
          python3 -c "
          coverage = float('${COVERAGE}')
          threshold = float('${COVERAGE_THRESHOLD}')
          if coverage < threshold:
              print(f'FAIL: Coverage {coverage}% is below threshold {threshold}%')
              exit(1)
          else:
              print(f'PASS: Coverage {coverage}% meets threshold {threshold}%')
          "

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/
          retention-days: 30
